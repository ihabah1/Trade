{% extends "app/base.html" %}

{% block title %}Seed Catalog{% endblock %}

{% block content %}
<div class="container mt-5">

    <h2 class="text-center mb-4">🌱 Seed Catalog</h2>

    <div class="row g-4">

        {% comment %} PRODUCT CARD TEMPLATE {% endcomment %}
        {% for seed in seeds %}
        <div class="col-md-4">
            <div class="card h-100 shadow-sm text-center">

                <img src="{{ seed.image }}"
                     class="card-img-top seed-image"
                     alt="{{ seed.name }}">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ seed.name }}</h5>
                    <p class="text-muted mb-3">${{ seed.price }}</p>

                    <a href="{% url 'app:basket' %}?name={{ seed.name|urlencode }}&price={{ seed.price }}"
                       class="btn btn-success mt-auto">
                        Add to Basket
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<style>
.seed-image {
    height: 220px;
    object-fit: cover;
}
</style>
{% endblock %}
