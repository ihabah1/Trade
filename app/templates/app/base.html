<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sell It Now{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .nav-link.active {
      font-weight: bold;
      border-bottom: 2px solid white;
    }
  </style>
</head>

<body class="bg-light">

<!-- 🔵 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">

    <a class="navbar-brand" href="{% url 'app:index' %}">Sell It Now</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto">

        <!-- Home -->
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match and request.resolver_match.url_name == 'index' %} active{% endif %}"
             href="{% url 'app:index' %}">
             Home
          </a>
        </li>

        {% if user.is_authenticated %}

        <!-- Lobby -->
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match and request.resolver_match.url_name == 'lobby' %} active{% endif %}"
             href="{% url 'app:lobby' %}">
             Lobby
          </a>
        </li>

        <!-- Profile -->
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match and request.resolver_match.url_name == 'profile' %} active{% endif %}"
             href="{% url 'app:profile' %}">
             Profile
          </a>
        </li>

        <!-- Logout -->
        <li class="nav-item">
          <a class="nav-link btn btn-danger text-white ms-3"
             href="{% url 'account_logout' %}">
             Logout
          </a>
        </li>

        {% else %}

        <!-- Login -->
        <li class="nav-item">
          <a class="nav-link" href="{% url 'account_login' %}">
            Login
          </a>
        </li>

        <!-- Register -->
        <li class="nav-item">
          <a class="nav-link" href="{% url 'account_signup' %}">
            Register
          </a>
        </li>

        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<!-- 📦 CONTENT -->
<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
