{% extends "app/base.html" %}

{% block title %}Lama plants – SellItNow{% endblock %}

{% block content %}
<div class="text-center mt-5">

    <h1 class="display-4">Lama plants</h1>

    <p class="lead">
        The right place for healthy seedlings — grow, nurture, and succeed.
    </p>

    <img src="https://i.imgur.com/KqbL6hX.jpeg"
         alt="Seedlings"
         class="img-fluid rounded shadow mb-4"
         style="max-height:300px; object-fit: cover;">

    {% if not user.is_authenticated %}
    <div class="d-flex justify-content-center">
        <a href="{% url 'account_login' %}" class="btn btn-primary btn-lg me-2">
            Login
        </a>
        <a href="{% url 'account_signup' %}" class="btn btn-success btn-lg">
            Register
        </a>
    </div>
    {% endif %}

</div>
{% endblock %}
