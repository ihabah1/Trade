{% extends "app/base.html" %}

{% block title %}Lama plants – SellItNow{% endblock %}

{% block content %}
<div class="text-center mt-5">

    <h1 class="display-4">Lama plants</h1>

    <p class="lead">
        The right place for healthy seedlings — grow, nurture, and succeed.
    </p>

    <!-- Imgur Embed (Responsive + Full Image Visible) -->
    <div class="mb-4 d-flex justify-content-center">
        <div class="rounded shadow"
             style="max-width:600px; width:100%;">

            <blockquote class="imgur-embed-pub"
                        lang="en"
                        data-id="a/jVB6sB1"
                        data-context="false"
                        style="margin:0;">
                <a href="//imgur.com/a/jVB6sB1"></a>
            </blockquote>

        </div>
    </div>

    {% if not user.is_authenticated %}
    <div class="d-flex justify-content-center">
        <a href="{% url 'account_login' %}" class="btn btn-primary btn-lg me-2">
            Login
        </a>
        <a href="{% url 'account_signup' %}" class="btn btn-success btn-lg">
            Register
        </a>
    </div>
    {% endif %}

</div>

<script async src="//s.imgur.com/min/embed.js" charset="utf-8"></script>

{% endblock %}
